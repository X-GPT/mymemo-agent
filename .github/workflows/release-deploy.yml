name: Release deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build and deploy. Defaults to release-${short_sha}-${run_number}."
        required: false
      environment:
        description: "Deployment environment"
        required: true
        default: "prod"

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "637423444544"
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      DEPLOY_CONFIG: infra/deploy/${{ inputs.environment }}.env
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/mymemo-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute immutable image tag
        env:
          REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ -n "${REQUESTED_IMAGE_TAG}" ]]; then
            echo "IMAGE_TAG=${REQUESTED_IMAGE_TAG}" >> "${GITHUB_ENV}"
          else
            short_sha="${GITHUB_SHA::7}"
            echo "IMAGE_TAG=release-${short_sha}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> "${GITHUB_ENV}"
          fi

      - name: Prepare Terraform variables
        run: scripts/deploy/ci_prepare_tfvars.sh

      - name: Ensure ECR repositories
        run: |
          terraform -chdir=infra/ecr init
          terraform -chdir=infra/ecr apply -auto-approve

      - name: Build and push chat-api image
        run: scripts/deploy/build_and_push_agent_image.sh chat-api

      - name: Build and push agent-worker image
        run: scripts/deploy/build_and_push_agent_image.sh agent-worker

      - name: Terraform plan
        run: scripts/deploy/terraform_prod_in_place_plan.sh

      - name: Terraform apply
        env:
          CONFIRM_AGENT_PROD_APPLY: apply-mymemo-agent-prod
        run: scripts/deploy/terraform_prod_in_place_apply.sh

      - name: Run agent DB migrations
        run: scripts/deploy/run_agent_migration.sh

      - name: Roll ECS services
        run: scripts/deploy/roll_ecs_services.sh

      - name: Production smoke
        run: scripts/deploy/prod_smoke.sh
