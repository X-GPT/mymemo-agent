# Local end-to-end harness (MYM-31): the full chat-api → sandbox-daemon →
# gateway path without E2B. The `sandbox` service replaces the E2B sandbox with a
# long-lived container running the same daemon + agent bundles, and `postgres`
# stands in for the MyMemo KB so the gateway can boot and serve document search.
#
# Config split: non-secret wiring (provider selection, service URLs, ports, the
# local DB connection) lives inline below, so reading a service's block shows
# exactly what it gets. Secrets live in a per-service env file next to each app
# (see each apps/<svc>/.env.example); copy each to .env and fill it in. One value
# is shared and MUST match across the files that use it:
#   LLM_TOKEN_SECRET   — chat-api (mints) + gateway (verifies)
#
# The daemon's /turn has no application-layer auth (MYM-35): in prod the E2B
# sandbox edge gates its public URL; here the `sandbox` container is unpublished
# on the compose network, so it has no secret and no env file.
#
# Note: the agent runs without bwrap — the sandbox container is the isolation
# boundary (see apps/sandbox-daemon/child-spawn.ts). dev and prod share one spawn
# path.

services:
  chat-api:
    build:
      context: .
      dockerfile: apps/chat-api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Select the local provider: reach the long-lived daemon container instead
      # of leasing an E2B sandbox per turn. E2B_API_KEY is not required here.
      SANDBOX_PROVIDER: local
      LOCAL_SANDBOX_DAEMON_URL: http://sandbox:8080
      # Same compose network — no getHost tunneling, just the service name.
      GATEWAY_PUBLIC_URL: http://gateway:8080
      # chat-api's OWN writable database (mymemo_agent), separate from the
      # gateway's read-only KB (mymemo_kb) on the same postgres instance. Holds
      # the sandbox-lease registry. Local-only dev credential, so inline.
      DATABASE_URL: postgresql://mymemo:mymemo@postgres:5432/mymemo_agent
      DB_SSL: disable
      LOG_LEVEL: info
    # Secrets: LLM_TOKEN_SECRET
    env_file:
      - apps/chat-api/.env
    depends_on:
      gateway:
        condition: service_started
      sandbox:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - mymemo-network

  # One-shot: apply the writable DB (mymemo_agent) schema from Drizzle migrations,
  # then exit. The postgres init only creates the database; the tables are owned
  # by migrations (apps/chat-api/src/db/schema.ts -> drizzle/). chat-api waits for
  # this to complete so its lease/conversation tables exist before it serves.
  # Reuses the chat-api image (which ships drizzle/); runs to completion, no restart.
  migrate:
    build:
      context: .
      dockerfile: apps/chat-api/Dockerfile
    # Override the image ENTRYPOINT (bun run src/index.ts) rather than CMD — the
    # image sets no CMD, so a `command:` would append to the entrypoint instead.
    entrypoint: ["bun", "run", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://mymemo:mymemo@postgres:5432/mymemo_agent
      DB_SSL: disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - mymemo-network

  # Control plane: the only service holding BOTH the real provider key
  # (ANTHROPIC_API_KEY) and the KB DATABASE_URL. Locally it talks to the
  # `postgres` service over the compose network with TLS disabled. The DB
  # connection is a local-only dev credential, so it is inline (not a secret).
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://mymemo:mymemo@postgres:5432/mymemo_kb
      DB_SSL: disable
      GATEWAY_PORT: "8080"
    # Secrets: ANTHROPIC_API_KEY, LLM_TOKEN_SECRET
    env_file:
      - apps/gateway/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mymemo-network

  # Replaces the E2B sandbox: a long-lived daemon container with the daemon +
  # agent bundles and the claude / mymemo-docs binaries baked in. The session
  # store is on a named volume so SDK transcripts survive `docker compose restart
  # sandbox`; the container's local ~/.claude does not.
  sandbox:
    build:
      context: .
      dockerfile: apps/sandbox-daemon/Dockerfile
    environment:
      AGENT_SESSION_STORE_ROOT: /session-store
    # No secrets: /turn has no app-layer auth (MYM-35); the container is
    # unpublished on the compose network.
    volumes:
      - session-store:/session-store
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks:
      - mymemo-network

  # The gateway requires a DATABASE_URL to boot. Seeded with the KB schema + FTS
  # and a small fixture (see apps/gateway/db/init.sql) so document search/fetch
  # return results for the seeded member. Local-only dev credentials, inline.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mymemo
      POSTGRES_PASSWORD: mymemo
      POSTGRES_DB: mymemo_kb
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Two databases on one instance: the gateway's read-only KB (mymemo_kb,
      # seeded here) and chat-api's writable mymemo_agent (lease registry).
      - ./apps/gateway/db/init.sql:/docker-entrypoint-initdb.d/00-kb.sql:ro
      - ./apps/chat-api/db/init.sql:/docker-entrypoint-initdb.d/10-chat-api.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymemo -d mymemo_kb"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks:
      - mymemo-network

networks:
  mymemo-network:
    driver: bridge

volumes:
  pgdata:
  session-store:
