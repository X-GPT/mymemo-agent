services:
  chat-api:
    container_name: chat-api
    build:
      context: .
      dockerfile: apps/chat-api/Dockerfile
    ports:
      - 3000:3000
    env_file:
      - ./apps/chat-api/.env
    depends_on:
      - gateway
    restart: always
    networks:
      - mymemo-network

  # Control plane: the single service holding BOTH the real provider key
  # (ANTHROPIC_API_KEY) and the read-only KB DATABASE_URL. Sandboxed agents reach
  # it with one short-lived, scope-bound bearer token — the Claude binary via
  # ANTHROPIC_BASE_URL (→ /v1/messages, proxied to Anthropic) and the mymemo-docs
  # CLI via MYMEMO_DOC_GATEWAY_URL (→ /v1/documents/*, scope enforced server-side,
  # reads the MyMemo KB Postgres / FTS directly).
  # Note: DATABASE_URL must point at a Postgres reachable from this service (the
  # staging RDS is private — needs an in-VPC host or tunnel), and
  # GATEWAY_PUBLIC_URL (set for chat-api) must resolve to an address reachable
  # from inside the E2B sandbox, not just this compose network.
  gateway:
    container_name: gateway
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - 8080:8080
    env_file:
      - ./apps/gateway/.env
    restart: always
    networks:
      - mymemo-network

networks:
  mymemo-network:
    driver: bridge
